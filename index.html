.start-card label{display:block;font-weight:900;margin-bottom:8px}.text-input{width:100%;padding:14px 16px;border:2px solid #d8d3c8;border-radius:14px;background:#fff;font-size:17px;outline:none}.text-input:focus,textarea:focus{border-color:#5f89a7;box-shadow:0 0 0 4px rgba(70,120,155,.12)}

.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:clamp(16px,3vw,26px);box-shadow:var(--shadow);margin:14px 0}.panel-title{display:flex;align-items:center;gap:10px;margin:0 0 10px;font-size:20px;letter-spacing:-.025em}.step-badge{display:inline-grid;place-items:center;width:30px;height:30px;border-radius:50%;background:var(--blue);color:#fff;font-size:14px}.lead{color:#566173;margin:4px 0 16px}.notice{padding:12px 14px;border-radius:13px;background:var(--blue2);border-left:4px solid var(--blue);margin:12px 0}.notice.warn{background:#fff3df;border-left-color:#cc8714}.notice.good{background:#e8f4ee;border-left-color:var(--green)}
.photo-count{font-weight:900;color:var(--blue);margin:8px 0 14px}.photo-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:12px}.photo-card{position:relative;border:0;background:#eee;border-radius:15px;overflow:hidden;min-height:180px;padding:0;text-align:left;box-shadow:0 4px 14px rgba(30,40,60,.10)}.photo-card img{width:100%;height:180px;display:block;object-fit:cover;filter:saturate(.78) contrast(1.02);transition:.25s}.photo-card:hover img{transform:scale(1.025)}.photo-label{position:absolute;left:0;right:0;bottom:0;padding:30px 12px 10px;color:#fff;background:linear-gradient(transparent,rgba(7,14,27,.86));font-weight:900;text-shadow:0 1px 3px #000}.photo-lock{position:absolute;inset:0;display:grid;place-items:center;background:rgba(12,25,42,.55);color:#fff;font-size:15px;font-weight:900;backdrop-filter:blur(1px)}.photo-card.viewed .photo-lock{display:none}.view-mark{position:absolute;top:9px;right:9px;background:#e5f4eb;color:#1f684a;border-radius:99px;padding:5px 8px;font-size:12px;font-weight:900;display:none}.photo-card.viewed .view-mark{display:block}

</style>
</head>

 {id:'c',pos:0,title:'군사 정변과 유신 체제',photoIds:['p13','p14','p15','p16'],caption:'민주주의가 안정되기 전에 5·16 군사 정변이 일어났고, 유신 체제 아래 국민의 자유와 정치 참여가 제한되었다.',wrong:['4·19 혁명 직후 대통령 직선제가 완성되었다.','군사 정변 뒤 국민의 정치 참여가 더 자유로워졌다.']},
 {id:'d',pos:1,title:'5·18 민주화 운동',photoIds:['p19','p21','p22','p20'],caption:'광주 시민들은 민주화를 요구하며 저항하고 서로 도왔으며, 그 희생과 정신은 이후 민주화 운동으로 이어졌다.',wrong:['광주 시민들은 부정 선거를 실시하기 위해 모였다.','5·18 직후 모든 민주화 문제가 즉시 해결되었다.']},
 {id:'e',pos:2,title:'1987년 민주화 운동과 대통령 직선제',photoIds:['p23','p24','p25','p26','p27'],caption:'국가 폭력과 진실 은폐에 분노한 시민들의 민주화 요구가 6월 민주 항쟁으로 커졌고, 대통령 직선제 개헌으로 이어졌다.',wrong:['1987년에는 시민들이 유신 체제를 다시 요구했다.','6월 민주 항쟁의 결과 대통령을 국민이 뽑지 못하게 되었다.']}
];
const connectors=[
 {pos:2,text:'국민의 선택이 무시되자 항의가 전국으로 퍼져',wrong:['모든 국민이 결과에 만족하여','군인들이 먼저 직선제를 실시하여']},
 {pos:0,text:'그러나 민주주의가 안정적으로 자리 잡기 전에',wrong:['그 결과 민주주의의 모든 문제가 끝나고','같은 날 곧바로 대통령 직선제가 시작되어']},
 {pos:1,text:'자유와 민주주의를 요구하는 움직임이 계속되어',wrong:['시민들이 정치에 관심을 완전히 잃어','부정 선거를 지지하는 목소리가 커져']},
 {pos:2,text:'희생과 저항의 기억이 이어지고 시민의 요구가 커져',wrong:['국가 폭력이 더 많은 지지를 얻어','국민이 직접 선거할 권리를 포기하여']}
];
const STORAGE='democracy_photo_story_v3';
function blankState(){return {name:'',started:false,current:0,progress:{},final:{step:0,selections:{},captions:{},connectors:{},thoughts:[],democracy:''},completed:false};}
let state=load();
function load(){try{return Object.assign(blankState(),JSON.parse(localStorage.getItem(STORAGE)||'{}'))}catch(e){return blankState()}}
function save(){localStorage.setItem(STORAGE,JSON.stringify(state));updateProgress()}
function esc(s=''){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function cp(id){if(!state.progress[id])state.progress[id]={viewed:[],infer:null,story:false,fact:false,flow:false,thought:''};return state.progress[id]}
const main=document.getElementById('main');
function stopSpeech(){if('speechSynthesis'in window)speechSynthesis.cancel()}
function render(){stopSpeech();if(state.completed)return renderComplete();if(!state.started)return renderStart();if(state.current<chapters.length)return renderChapter();return renderFinal();}
function updateProgress(){let pct=0,label='시작 전';if(state.started){const done=Object.values(state.progress).filter(x=>x.flow).length;if(state.completed){pct=100;label='사진 연표 완성'}else if(state.current>=chapters.length){pct=82+Math.min(17,(state.final.step||0)*5);label='나의 민주화 사진 연표 만들기'}else{pct=Math.round((done/chapters.length)*78);label=`${state.current+1}/${chapters.length}장 진행 중`}}document.getElementById('progressFill').style.width=pct+'%';document.getElementById('progressText').textContent=label}
function renderStart(){updateProgress();const has=state.name&&Object.keys(state.progress).length>0;main.innerHTML=`<section class="hero"><div class="hero-copy"><div class="eyebrow">PHOTO HISTORY STORY</div><h1>사진들 사이에서<br>민주화의 이야기를<br>찾아보세요.</h1><p>사진 한 장의 이름을 맞히는 활동이 아닙니다. 여러 사진의 변화를 살펴보고, 교과서에서 사실을 확인하고, 사건이 다음 사건으로 이어진 까닭과 자신의 생각을 기록합니다.</p></div><div><div class="hero-collage"><img src="${IMG}07-april-main.webp"><img src="${IMG}13-coup-park.webp"><img src="${IMG}19-gwangju-event.webp"><img src="${IMG}25-lee-memorial-crowd.webp"></div><div class="start-card"><label for="nameInput">이름</label><input id="nameInput" class="text-input" maxlength="12" placeholder="이름을 입력하세요" value="${esc(state.name)}"><div class="mini-list"><div class="mini-item"><b>1</b><span>사진들을 모두 열어 보고 장면 사이의 변화를 찾습니다.</span></div><div class="mini-item"><b>2</b><span>교과서로 사실과 원인·과정·결과를 확인합니다.</span></div><div class="mini-item"><b>3</b><span>마지막에는 기억에 남은 사진으로 나만의 사진 연표를 만듭니다.</span></div></div><button class="primary full" id="startBtn">${has?'이어 공부하기':'이야기 시작하기'}</button>${has?`<button class="ghost full" style="margin-top:10px" id="newBtn">새로 시작하기</button>`:''}</div></div></section>`;
 document.getElementById('startBtn').onclick=()=>{const n=document.getElementById('nameInput').value.trim();if(!n){alert('이름을 입력하세요.');return}state.name=n;state.started=true;save();render()};if(has)document.getElementById('newBtn').onclick=()=>{if(confirm('저장된 진행 내용을 지우고 새로 시작할까요?')){state=blankState();localStorage.removeItem(STORAGE);render()}}}
function rail(){return `<div class="story-rail">${chapters.map((c,i)=>`<span class="rail-node ${i<state.current?'done':i===state.current?'current':''}">${i+1}. ${c.title}</span>`).join('')}</div>`}
function renderChapter(){updateProgress();const ch=chapters[state.current],p=cp(ch.id);const allViewed=ch.photos.every(id=>p.viewed.includes(id));main.innerHTML=`${rail()}<section class="chapter-head"><div class="chapter-no">CHAPTER ${ch.id}</div><h2>${ch.title}</h2><p>${ch.subtitle}</p></section><section class="panel"><h3 class="panel-title"><span class="step-badge">1</span> 사진들을 천천히 구경하기</h3><p class="lead">사진을 누르면 크게 볼 수 있습니다. <b>모든 사진을 한 번씩 열어 보아야</b> 다음 이야기가 열립니다.</p><div class="photo-count">${p.viewed.length} / ${ch.photos.length}장 관찰 완료</div><div class="photo-grid">${ch.photos.map(id=>photoCard(id,p.viewed.includes(id))).join('')}</div>${!allViewed?`<div class="notice warn">사진의 글자, 사람 수, 표정, 거리 분위기와 앞뒤 사진의 변화를 살펴보세요.</div>`:''}</section><div id="stages"></div>`;
 document.querySelectorAll('.photo-card').forEach(b=>b.onclick=()=>openPhoto(b.dataset.id,ch.id));if(allViewed)renderStages(ch,p)}
function photoCard(id,viewed){const x=photos[id];return `<button class="photo-card ${viewed?'viewed':''}" data-id="${id}"><img src="${IMG+x.src}" alt="${esc(x.title)}" loading="lazy"><span class="photo-label">${esc(x.short)}</span><span class="photo-lock">눌러서 크게 보기</span><span class="view-mark">관찰 완료 ✓</span></button>`}
function openPhoto(id,chId){const x=photos[id],p=cp(chId);document.getElementById('modalBox').innerHTML=`<div class="modal-head"><b>사진 자세히 보기</b><button class="icon-btn" id="closeModal">닫기</button></div><div class="modal-photo"><img src="${IMG+x.src}" alt="${esc(x.title)}"></div><div class="modal-caption"><h3>${esc(x.title)}</h3><p>${esc(x.year)} · ${esc(x.short)}</p><div class="notice">사진의 사람, 글자, 표정, 주변 모습 중 눈에 들어오는 것을 하나 찾아보세요.</div></div>`;document.getElementById('modal').classList.remove('hidden');document.getElementById('closeModal').onclick=closeModal;if(!p.viewed.includes(id)){p.viewed.push(id);save()}document.getElementById('modal').dataset.rerender='1'}
function closeModal(){document.getElementById('modal').classList.add('hidden');if(document.getElementById('modal').dataset.rerender){delete document.getElementById('modal').dataset.rerender;render()}}
function renderStages(ch,p){const box=document.getElementById('stages');let html='';html+=inferHTML(ch,p);if(p.infer!==null)html+=storyHTML(ch,p);if(p.story)html+=factHTML(ch,p);if(p.fact)html+=flowHTML(ch,p);if(p.flow)html+=thoughtOrCompleteHTML(ch,p);box.innerHTML=html;bindStages(ch,p)}
function inferHTML(ch,p){return `<section class="panel" id="inferPanel"><h3 class="panel-title"><span class="step-badge">2</span> 사진 사이의 맥락 추측하기</h3><p class="question">${ch.infer.q}</p><div class="options">${ch.infer.choices.map((t,i)=>`<button class="option ${p.infer===i?'selected':''}" data-infer="${i}"><span class="opt-num">${i+1}</span><span>${t}</span></button>`).join('')}</div>${p.infer!==null?`<div class="notice good"><b>사진을 바탕으로 한 첫 추측을 남겼습니다.</b><br>이제 역사 이야기를 읽고 실제 사실과 비교해 보세요.</div>`:''}</section>`}
function storyHTML(ch,p){const hero=photos[ch.photos[Math.min(1,ch.photos.length-1)]];return `<section class="panel"><h3 class="panel-title"><span class="step-badge">3</span> 사진과 함께 이야기 읽기</h3><div class="story-box"><div class="story-photo"><img src="${IMG+hero.src}" alt=""></div><div class="story-text" id="storyText">${ch.story.map(x=>`<p>${x}</p>`).join('')}<div class="notice"><b>교과서 확인</b><br>교과서에서 이 장과 관련된 소제목을 찾아 원인과 결과가 맞는지 다시 확인하세요.</div><div class="story-actions"><button class="secondary" id="speakBtn">🔊 이야기 소리로 듣기</button>${!p.story?`<button class="primary" id="storyDone">교과서까지 확인했어요</button>`:`<span class="notice good">이야기 확인 완료 ✓</span>`}</div></div></div></section>`}
function choicesHTML(q,key,done){return `<section class="panel"><h3 class="panel-title"><span class="step-badge">${key==='fact'?4:5}</span> ${key==='fact'?'사실을 정확하게 확인하기':'앞 사건과 다음 사건 연결하기'}</h3>${key==='flow'?`<div class="flow-box"><div class="flow-node">${q.before}</div><div class="flow-arrow">↓</div><div class="flow-blank"><b>${q.q}</b></div><div class="flow-arrow">↓</div><div class="flow-node">${q.after}</div></div>`:`<p class="question">${q.q}</p>`}<div class="options" style="margin-top:14px">${q.choices.map((t,i)=>`<button class="option" data-${key}="${i}"><span class="opt-num">${i+1}</span><span>${t}</span></button>`).join('')}</div><div id="${key}Feedback">${done?`<div class="notice good">정확하게 연결했습니다. ✓</div>`:''}</div></section>`}
function factHTML(ch,p){return choicesHTML(ch.fact,'fact',p.fact)}
function flowHTML(ch,p){return choicesHTML(ch.flow,'flow',p.flow)}
function thoughtOrCompleteHTML(ch,p){if(ch.thought)return `<section class="panel"><h3 class="panel-title"><span class="step-badge">6</span> 사진에서 시작한 나의 생각</h3><p class="question">${ch.thought.prompt}</p><div class="notice">${ch.thought.help}</div><textarea id="thoughtText" maxlength="350" placeholder="사진에서 본 장면을 근거로 자신의 생각을 써 보세요.">${esc(p.thought)}</textarea><div class="char-info"><span id="charCount">${p.thought.length}</span>자 · ${ch.thought.min}자 이상</div><div id="thoughtFeedback"></div><div class="actions"><button class="primary" id="saveThought">생각 저장하고 다음 장으로</button></div></section>`;return completeHTML(ch)}
function completeHTML(ch){return `<section class="panel chapter-complete"><div class="seal">${ch.id}</div><h3>${ch.id}장 이야기 연결 완료</h3><p>사진의 변화, 교과서의 사실, 앞뒤 사건의 관계를 확인했습니다.</p><button class="primary" id="nextChapter">${ch.id===chapters.length?'사진 연표 만들러 가기':'다음 이야기로'}</button></section>`}
function bindStages(ch,p){document.querySelectorAll('[data-infer]').forEach(b=>b.onclick=()=>{p.infer=+b.dataset.infer;save();renderChapter()});const speak=document.getElementById('speakBtn');if(speak)speak.onclick=()=>{stopSpeech();const u=new SpeechSynthesisUtterance(ch.story.map(s=>s.replace(/<[^>]+>/g,'')).join(' '));u.lang='ko-KR';u.rate=.92;speechSynthesis.speak(u)};const sd=document.getElementById('storyDone');if(sd)sd.onclick=()=>{p.story=true;save();renderChapter();setTimeout(()=>document.getElementById('stages')?.scrollIntoView({behavior:'smooth',block:'start'}),100)};bindCorrect(ch,'fact',p);bindCorrect(ch,'flow',p);const ta=document.getElementById('thoughtText');if(ta)ta.oninput=e=>{p.thought=e.target.value;document.getElementById('charCount').textContent=e.target.value.length;save()};const st=document.getElementById('saveThought');if(st)st.onclick=()=>{const t=ta.value.trim();if(t.length<ch.thought.min){document.getElementById('thoughtFeedback').innerHTML=`<div class="notice warn">사진에서 본 구체적인 장면과 그렇게 생각한 까닭을 조금 더 써 보세요. (${ch.thought.min}자 이상)</div>`;return}p.thought=t;save();state.current++;save();render();window.scrollTo(0,0)};const nx=document.getElementById('nextChapter');if(nx)nx.onclick=()=>{state.current++;save();render();window.scrollTo(0,0)}}
function bindCorrect(ch,key,p){if(p[key])return;document.querySelectorAll(`[data-${key}]`).forEach(b=>b.onclick=()=>{const i=+b.dataset[key],q=ch[key];document.querySelectorAll(`[data-${key}]`).forEach(x=>x.classList.remove('selected','wrong','correct'));b.classList.add(i===q.correct?'correct':'wrong');const fb=document.getElementById(key+'Feedback');if(i===q.correct){p[key]=true;save();fb.innerHTML='<div class="notice good"><b>정확합니다.</b> 사진과 교과서의 내용을 바르게 연결했습니다.</div>';setTimeout(()=>renderChapter(),650)}else{fb.innerHTML=`<div class="notice warn"><b>한 번 더 확인해 보세요.</b><br>${esc(q.hint||'앞뒤 사진과 이야기의 원인·결과를 다시 살펴보세요.')}</div>`}})}
function renderFinal(){updateProgress();const f=state.final;main.innerHTML=`<section class="final-intro"><div class="eyebrow">FINAL WORK</div><h2>나의 민주화 사진 연표</h2><p>지금까지 본 사진들 중 각 시기를 가장 잘 보여 주거나 기억에 남는 사진을 고릅니다. 정답이 있는 사실과 연결 문장을 확인한 뒤, 자신의 생각을 더해 한 장의 연표를 완성합니다.</p></section>${f.step===0?selectPhotosHTML():f.step===1?editTimelineHTML():f.step===2?thoughtsHTML():finalCheckHTML()}`;bindFinal()}
function selectPhotosHTML(){return `<section class="panel"><h3 class="panel-title"><span class="step-badge">1</span> 시기별로 기억에 남는 사진 고르기</h3><p class="lead">각 시기에서 한 장씩, 모두 5장을 선택하세요.</p>${phases.map(ph=>`<div class="phase"><h3>${ph.title}</h3><div class="select-photo-grid">${ph.photoIds.map(id=>{const x=photos[id],on=state.final.selections[ph.id]===id;return `<button class="select-photo ${on?'chosen':''}" data-phase="${ph.id}" data-photo="${id}"><img src="${IMG+x.src}"><span>${x.short}</span></button>`}).join('')}</div></div>`).join('')}<div class="actions"><button class="primary" id="toEdit">선택한 사진으로 연표 구성하기</button></div></section>`}
function makeOptions(correct,wrong,selected,key,pos=0){const arr=[...wrong];arr.splice(pos,0,correct);return `<div class="options">${arr.map((x,i)=>`<button class="option ${selected===i?'selected':''}" data-finalkey="${key}" data-value="${i}"><span class="opt-num">${i+1}</span><span>${x}</span></button>`).join('')}</div>`}
function editTimelineHTML(){
 const rows=phases.map((ph,i)=>{
  const id=state.final.selections[ph.id],x=photos[id];
  const item=`<div class="timeline-item"><img src="${IMG+x.src}"><div><h4>${i+1}. ${ph.title}</h4>${makeOptions(ph.caption,ph.wrong,state.final.captions[ph.id],`cap:${ph.id}`,ph.pos)}</div></div>`;
  const con=i<connectors.length?`<div class="connector-edit"><span></span><div><b>다음 장면으로 이어지는 말</b>${makeOptions(connectors[i].text,connectors[i].wrong,state.final.connectors[i],`con:${i}`,connectors[i].pos)}</div></div>`:'';
  return item+con;
 }).join('');
 return `<section class="panel"><h3 class="panel-title"><span class="step-badge">2</span> 사진 아래 사실과 사이의 연결 문장 완성하기</h3><p class="lead">사진은 시기별로 배치되었습니다. 각 사진에 맞는 설명과 사진 사이의 연결 문장을 고르세요.</p><div class="timeline-edit">${rows}</div><div id="finalEditFeedback"></div><div class="actions"><button class="ghost" id="backSelect">사진 다시 고르기</button><button class="primary" id="checkTimeline">연표 내용 확인</button></div></section>`;
}
function thoughtsHTML(){const saved=chapters.filter(c=>c.thought&&cp(c.id).thought).map(c=>({id:c.id,title:c.title,text:cp(c.id).thought}));return `<section class="panel"><h3 class="panel-title"><span class="step-badge">3</span> 연표에 넣을 나의 생각 고르기</h3><p class="lead">앞에서 작성한 생각 중 연표에 남길 생각을 1~2개 고르세요.</p><div class="thought-pick">${saved.map(t=>`<button class="thought-option ${state.final.thoughts.includes(t.id)?'chosen':''}" data-thought="${t.id}"><b>${t.title}</b>${esc(t.text)}</button>`).join('')}</div><h3 style="margin-top:24px">내가 생각하는 민주주의</h3><p class="lead">사진 이야기를 모두 살펴본 뒤의 생각을 한 문장으로 적으세요.</p><textarea id="democracyText" maxlength="250" placeholder="예: 민주주의는 시민이 관심을 가지고 자신의 권리와 다른 사람의 권리를 함께 지켜 갈 때 발전한다고 생각한다.">${esc(state.final.democracy)}</textarea><div class="char-info"><span id="demoCount">${state.final.democracy.length}</span>자 · 15자 이상</div><div id="finalThoughtFeedback"></div><div class="actions"><button class="ghost" id="backEdit">연표 내용 다시 보기</button><button class="primary" id="toCheck">완성 작품 미리 보기</button></div></section>`}
function finalCheckHTML(){return `<section class="panel"><h3 class="panel-title"><span class="step-badge">4</span> 나의 사진 연표 완성하기</h3><p class="lead">사진, 역사적 사실, 연결 문장과 나의 생각이 한 장에 담깁니다.</p><div class="notice">완성 버튼을 누르면 PNG 이미지가 만들어집니다. 태블릿에서는 이미지 저장 또는 화면 캡처로 결과물을 남길 수 있습니다.</div><div class="actions"><button class="ghost" id="backThought">생각 수정하기</button><button class="primary" id="finishBtn">나의 민주화 사진 연표 완성</button></div></section>`}
function bindFinal(){document.querySelectorAll('[data-phase]').forEach(b=>b.onclick=()=>{state.final.selections[b.dataset.phase]=b.dataset.photo;b.closest('.select-photo-grid').querySelectorAll('.select-photo').forEach(x=>x.classList.toggle('chosen',x===b));save()});const te=document.getElementById('toEdit');if(te)te.onclick=()=>{if(phases.some(p=>!state.final.selections[p.id])){alert('각 시기에서 사진을 한 장씩 선택하세요.');return}state.final.step=1;save();renderFinal();window.scrollTo(0,0)};document.querySelectorAll('[data-finalkey]').forEach(b=>b.onclick=()=>{const [type,id]=b.dataset.finalkey.split(':');if(type==='cap')state.final.captions[id]=+b.dataset.value;else state.final.connectors[id]=+b.dataset.value;b.closest('.options').querySelectorAll('.option').forEach(x=>x.classList.toggle('selected',x===b));save()});const bs=document.getElementById('backSelect');if(bs)bs.onclick=()=>{state.final.step=0;save();renderFinal()};const ct=document.getElementById('checkTimeline');if(ct)ct.onclick=()=>{const caps=phases.every(p=>state.final.captions[p.id]===p.pos),cons=connectors.every((c,i)=>state.final.connectors[i]===c.pos);if(!caps||!cons){document.getElementById('finalEditFeedback').innerHTML='<div class="notice warn"><b>아직 맞지 않는 설명이나 연결 문장이 있습니다.</b><br>사진의 시기와 앞뒤 사건의 관계를 다시 확인하세요.</div>';return}state.final.step=2;save();renderFinal();window.scrollTo(0,0)};document.querySelectorAll('[data-thought]').forEach(b=>b.onclick=()=>{const id=+b.dataset.thought,a=state.final.thoughts,idx=a.indexOf(id);if(idx>=0){a.splice(idx,1);b.classList.remove('chosen')}else if(a.length<2){a.push(id);b.classList.add('chosen')}else alert('생각은 두 개까지 고를 수 있습니다.');save()});const dt=document.getElementById('democracyText');if(dt)dt.oninput=e=>{state.final.democracy=e.target.value;document.getElementById('demoCount').textContent=e.target.value.length;save()};const be=document.getElementById('backEdit');if(be)be.onclick=()=>{state.final.step=1;save();renderFinal()};const tc=document.getElementById('toCheck');if(tc)tc.onclick=()=>{const t=dt.value.trim();if(!state.final.thoughts.length||t.length<15){document.getElementById('finalThoughtFeedback').innerHTML='<div class="notice warn">앞에서 쓴 생각을 한 개 이상 고르고, 민주주의에 대한 생각을 15자 이상 적으세요.</div>';return}state.final.democracy=t;state.final.step=3;save();renderFinal()};const bt=document.getElementById('backThought');if(bt)bt.onclick=()=>{state.final.step=2;save();renderFinal()};const fin=document.getElementById('finishBtn');if(fin)fin.onclick=async()=>{state.completed=true;save();render();}}
async function renderComplete(){updateProgress();main.innerHTML=`<section class="final-intro"><div class="eyebrow">COMPLETED</div><h2>${esc(state.name)}의 민주화 사진 연표</h2><p>여러 사진의 맥락을 연결하고, 역사적 사실과 자신의 생각을 담아 연표를 완성했습니다.</p></section><div class="completion-actions"><button class="primary" id="downloadPoster">PNG 이미지로 저장</button><button class="ghost" id="printPoster">인쇄하기</button><button class="ghost" id="editPoster">연표 수정하기</button></div><div class="poster-wrap"><img id="posterPreview" alt="완성된 민주화 사진 연표"></div><div class="notice good" style="max-width:720px;margin:16px auto"><b>태블릿에서 저장이 되지 않을 때</b><br>완성 작품이 모두 보이도록 스크롤 캡처를 하거나, 인쇄하기에서 PDF로 저장하세요.</div>`;const url=await buildPoster();document.getElementById('posterPreview').src=url;document.getElementById('downloadPoster').onclick=()=>{const a=document.createElement('a');a.download=`${state.name}_민주화_사진연표.png`;a.href=url;a.click()};document.getElementById('printPoster').onclick=()=>window.print();document.getElementById('editPoster').onclick=()=>{state.completed=false;state.final.step=2;save();render();window.scrollTo(0,0)}}
function loadImage(src){return new Promise((res,rej)=>{const im=new Image();im.onload=()=>res(im);im.onerror=rej;im.src=src})}
function wrapText(ctx,text,x,y,maxWidth,lineHeight,maxLines=99){const chars=[...text];let line='',lines=[];for(const c of chars){const test=line+c;if(ctx.measureText(test).width>maxWidth&&line){lines.push(line);line=c}else line=test}if(line)lines.push(line);lines=lines.slice(0,maxLines);lines.forEach((l,i)=>ctx.fillText(l,x,y+i*lineHeight));return y+lines.length*lineHeight}
function coverDraw(ctx,img,x,y,w,h){const r=Math.max(w/img.width,h/img.height),sw=w/r,sh=h/r,sx=(img.width-sw)/2,sy=(img.height-sh)/2;ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h)}
async function buildPoster(){const canvas=document.createElement('canvas'),W=1200,H=3400;canvas.width=W;canvas.height=H;const c=canvas.getContext('2d');c.fillStyle='#f6f0e3';c.fillRect(0,0,W,H);c.fillStyle='#163453';c.fillRect(0,0,W,205);c.fillStyle='#fff';c.textAlign='center';c.font='800 58px "Noto Sans KR",sans-serif';c.fillText('나의 민주화 사진 연표',W/2,82);c.font='500 27px sans-serif';c.fillText(`${state.name} · 사진으로 연결한 대한민국 민주화 이야기`,W/2,135);c.fillStyle='#e6c87e';c.fillRect(140,163,W-280,5);let y=250;const imgs={};for(const ph of phases){const id=state.final.selections[ph.id];imgs[id]=await loadImage(IMG+photos[id].src)}c.textAlign='left';for(let i=0;i<phases.length;i++){const ph=phases[i],id=state.final.selections[ph.id],im=imgs[id];c.fillStyle='#fff';roundRect(c,70,y,W-140,390,24,true);coverDraw(c,im,95,y+25,390,270);c.fillStyle='#173b5d';c.font='800 30px sans-serif';c.fillText(`${i+1}. ${ph.title}`,520,y+55);c.fillStyle='#26364b';c.font='500 24px sans-serif';wrapText(c,ph.caption,520,y+105,575,38,6);c.fillStyle='#667184';c.font='500 18px sans-serif';c.fillText(`${photos[id].year} · ${photos[id].short}`,95,y+330);y+=410;if(i<connectors.length){c.textAlign='center';c.fillStyle='#a86d0f';c.font='800 23px sans-serif';c.fillText('↓  '+connectors[i].text,W/2,y+24);c.textAlign='left';y+=62}}
 c.fillStyle='#173b5d';c.font='800 34px sans-serif';c.fillText('사진에서 시작한 나의 생각',70,y+15);y+=55;const selected=state.final.thoughts.map(id=>chapters.find(ch=>ch.id===id)).filter(Boolean);for(const ch of selected){c.fillStyle='#fffaf0';roundRect(c,70,y,W-140,155,18,true);c.fillStyle='#a86d0f';c.font='800 21px sans-serif';c.fillText(ch.title,95,y+38);c.fillStyle='#26364b';c.font='500 22px sans-serif';wrapText(c,cp(ch.id).thought,95,y+75,W-190,33,3);y+=175}
 c.fillStyle='#e6eef4';roundRect(c,70,y,W-140,210,22,true);c.fillStyle='#173b5d';c.font='800 31px sans-serif';c.fillText('내가 생각하는 민주주의',95,y+52);c.fillStyle='#1e2d40';c.font='600 25px sans-serif';wrapText(c,state.final.democracy,95,y+103,W-190,38,3);c.fillStyle='#6c7480';c.font='500 16px sans-serif';c.fillText('사진 자료의 출처와 이용 조건은 웹앱의 ⓘ에서 확인할 수 있습니다.',70,H-45);return canvas.toDataURL('image/png')}
function roundRect(ctx,x,y,w,h,r,fill){ctx.beginPath();if(ctx.roundRect){ctx.roundRect(x,y,w,h,r)}else{ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y)}if(fill)ctx.fill()}
function showInfo(){const list=Object.values(photos).map((p,i)=>`<div class="credit"><b>${i+1}. ${esc(p.title)}</b><br>${esc(p.source)}<br><a href="${p.page}" target="_blank" rel="noopener">원본 파일 설명과 이용 조건 확인</a></div>`).join('');document.getElementById('modalBox').innerHTML=`<div class="modal-head"><h3>사용 방법 · 사진 출처</h3><button class="icon-btn" id="closeModal">닫기</button></div><div class="notice"><b>사진은 저장소의 images 폴더에 압축 WebP로 포함됩니다.</b><br>외부 사진 링크가 끊겨도 앱에서는 사진을 볼 수 있고, 같은 사진은 브라우저에 저장되어 반복 접속 시 다시 내려받는 양이 줄어듭니다.</div><p>역사적 사실 문제는 교과서에서 확인한 뒤 풀도록 설계했습니다. 생각 쓰기는 하나의 정답을 채점하지 않지만, 사진 속 장면과 까닭을 포함해 일정 분량 이상 작성해야 합니다.</p><h3>사진 및 기록 자료 ${Object.keys(photos).length}개</h3><div class="credits">${list}</div>`;document.getElementById('modal').classList.remove('hidden');document.getElementById('closeModal').onclick=closeModal}
document.getElementById('infoBtn').onclick=showInfo;document.getElementById('homeBtn').onclick=()=>{state.started=false;save();render();window.scrollTo(0,0)};document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')closeModal()};render();
</script>
