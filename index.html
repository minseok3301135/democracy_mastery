const STORAGE='democracy_photo_story_v6';
const LEGACY_STORAGE='democracy_photo_story_v4';
function blankState(){return {name:'',started:false,current:0,progress:{},final:{step:0,selections:{},captions:{},connectors:{},orders:{},thoughtArchive:{},democracy:''},completed:false};}
function normalize(raw){const b=blankState(),s=Object.assign(b,raw||{});s.progress=s.progress||{};s.final=Object.assign(b.final,s.final||{});s.final.selections=s.final.selections||{};s.final.captions=s.final.captions||{};s.final.connectors=s.final.connectors||{};s.final.orders=s.final.orders||{};s.final.thoughtArchive=s.final.thoughtArchive||{};for(const [id,p] of Object.entries(s.progress)){if(p&&p.thought&&!s.final.thoughtArchive[id])s.final.thoughtArchive[id]=p.thought}return s}
let state=load();
function load(){try{const current=localStorage.getItem(STORAGE);if(current)return normalize(JSON.parse(current));const legacy=localStorage.getItem(LEGACY_STORAGE);const migrated=legacy?normalize(JSON.parse(legacy)):blankState();if(legacy){migrated.completed=false;if(migrated.current>=chapters.length)migrated.final.step=2;localStorage.setItem(STORAGE,JSON.stringify(migrated))}return migrated}catch(e){return blankState()}}
function save(){localStorage.setItem(STORAGE,JSON.stringify(state));updateProgress()}
function esc(s=''){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function orderFor(store,key,n){store.orders=store.orders||{};const old=store.orders[key];if(!Array.isArray(old)||old.length!==n||new Set(old).size!==n)store.orders[key]=shuffle([...Array(n).keys()]);return store.orders[key]}
function cp(id){const d={viewed:[],infer:false,story:false,bookSentence:'',fact:false,flow:false,thought:'',thoughtDone:false,orders:{}};state.progress[id]=Object.assign(d,state.progress[id]||{});state.progress[id].viewed=state.progress[id].viewed||[];state.progress[id].orders=state.progress[id].orders||{};return state.progress[id]}
function thoughtChapters(){return chapters.filter(c=>c.thought)}
function getThought(id){const p=cp(id);return (p.thought||state.final.thoughtArchive[id]||'').trim()}
function setThought(id,text){const p=cp(id);p.thought=text;p.thoughtDone=!!text.trim();state.final.thoughtArchive[id]=text}
const main=document.getElementById('main');
function render(){if(state.completed)return renderComplete();if(!state.started)return renderStart();if(state.current<chapters.length)return renderChapter();return renderFinal()}
function updateProgress(){let pct=0,label='시작 전';if(state.started){const done=chapters.filter(c=>cp(c.id).flow).length;if(state.completed){pct=100;label='사진 연표 완성'}else if(state.current>=chapters.length){pct=84+Math.min(15,(state.final.step||0)*5);label='나의 민주화 사진 연표 만들기'}else{pct=Math.round((done/chapters.length)*82);label=`${state.current+1}/${chapters.length}장 진행 중`}}document.getElementById('progressFill').style.width=pct+'%';document.getElementById('progressText').textContent=label}
function renderStart(){updateProgress();const has=state.name&&Object.keys(state.progress).length>0;main.innerHTML=`<section class="hero"><div class="hero-copy"><div class="eyebrow">PHOTO HISTORY STORY</div><h1>사진들 사이에서<br>민주화의 이야기를<br>찾아보세요.</h1><p>여러 사진의 맥락을 살펴보고, 교과서에서 관련 문장을 찾아 적고, 사건이 다음 사건으로 이어진 까닭과 자신의 생각을 기록합니다.</p></div><div><div class="hero-collage"><img src="${IMG}07-april-main.webp"><img src="${IMG}18-chun-portrait.webp"><img src="${IMG}20-gwangju-resistance.webp"><img src="${IMG}25-lee-memorial-crowd.webp"></div><div class="start-card"><label for="nameInput">이름</label><input id="nameInput" class="text-input" maxlength="12" placeholder="이름을 입력하세요" value="${esc(state.name)}"><div class="mini-list"><div class="mini-item"><b>1</b><span>사진마다 관련 있는 낱말 두 개를 찾으며 자세히 봅니다.</span></div><div class="mini-item"><b>2</b><span>사진들 사이의 맥락을 맞히고 교과서 문장을 한 문장씩 기록합니다.</span></div><div class="mini-item"><b>3</b><span>마지막에는 사진과 생각이 함께 담긴 나만의 민주화 연표를 만듭니다.</span></div></div><button class="primary full" id="startBtn">${has?'이어 공부하기':'이야기 시작하기'}</button>${has?`<button class="ghost full" style="margin-top:10px" id="newBtn">새로 시작하기</button>`:''}</div></div></section>`;
 document.getElementById('startBtn').onclick=()=>{const n=document.getElementById('nameInput').value.trim();if(!n){alert('이름을 입력하세요.');return}state.name=n;state.started=true;save();render()};if(has)document.getElementById('newBtn').onclick=()=>{if(confirm('저장된 진행 내용을 지우고 새로 시작할까요?')){state=blankState();localStorage.removeItem(STORAGE);render()}}}
function rail(){return `<div class="story-rail">${chapters.map((c,i)=>`<span class="rail-node ${i<state.current?'done':i===state.current?'current':''}">${i+1}. ${c.title}</span>`).join('')}</div>`}
function renderChapter(){updateProgress();const ch=chapters[state.current],p=cp(ch.id),allViewed=ch.photos.every(id=>p.viewed.includes(id));const photoArea=allViewed?`<details class="photo-review"><summary><b>✓ 사진 ${ch.photos.length}장 관찰 완료</b><span>사진들을 다시 보려면 누르세요</span></summary><div class="photo-grid">${ch.photos.map(id=>photoCard(id,true)).join('')}</div></details>`:`<section class="panel"><h3 class="panel-title"><span class="step-badge">1</span> 사진들을 천천히 구경하기</h3><p class="lead">사진을 누른 뒤 <b>사진과 관련 있는 낱말 두 개</b>를 찾아야 관찰이 완료됩니다. 모든 사진을 관찰하면 다음 이야기가 열립니다.</p><div class="photo-count">${p.viewed.length} / ${ch.photos.length}장 관찰 완료</div><div class="photo-grid">${ch.photos.map(id=>photoCard(id,p.viewed.includes(id))).join('')}</div><div class="notice warn">사진만 빠르게 넘기지 말고, 화면 속 장면과 관련 있는 낱말을 찾아보세요.</div></section>`;main.innerHTML=`${rail()}<section class="chapter-head"><div class="chapter-no">CHAPTER ${ch.id}</div><h2>${ch.title}</h2><p>${ch.subtitle}</p></section>${photoArea}<div id="stages"></div>`;document.querySelectorAll('.photo-card').forEach(b=>b.onclick=()=>openPhoto(b.dataset.id,ch.id));if(allViewed)renderStages(ch,p)}
function photoCard(id,viewed){const x=photos[id];return `<button class="photo-card ${viewed?'viewed':''}" data-id="${id}"><img src="${IMG+x.src}" alt="${esc(x.short)}" loading="lazy"><span class="photo-label">${esc(x.short)}</span><span class="photo-lock">눌러서 자세히 보기</span><span class="view-mark">관찰 완료 ✓</span></button>`}

function openPhoto(id,chId){const x=photos[id],p=cp(chId),done=p.viewed.includes(id);if(done){document.getElementById('modalBox').innerHTML=`<div class="modal-head"><b>관찰을 마친 사진</b><button class="icon-btn" id="closeModal">닫기</button></div><div class="modal-quiz-layout"><div class="modal-media"><div class="modal-photo"><img src="${IMG+x.src}" alt="${esc(x.title)}"></div></div><div class="modal-side">${photoExplanationHTML(x)}<div class="notice good">관련 낱말: <b>${esc(x.words[x.correctWords[0]])}</b>, <b>${esc(x.words[x.correctWords[1]])}</b></div></div></div>`;showModal();return}
 const order=orderFor(p,'photo:'+id,x.words.length);document.getElementById('modalBox').innerHTML=`<div class="modal-head"><b>사진과 관련 있는 낱말 두 개 찾기</b><button class="icon-btn" id="closeModal">닫기</button></div><div class="modal-quiz-layout"><div class="modal-media"><div class="modal-photo"><img src="${IMG+x.src}" alt="역사 사진"></div></div><div class="modal-side">${photoExplanationHTML(x)}<p class="question" style="margin-top:14px">사진과 설명을 함께 살펴보고, 관련 있는 낱말을 정확히 두 개 고르세요.</p><div class="word-grid">${order.map((orig,i)=>`<button class="word-option" data-word="${orig}">${esc(x.words[orig])}</button>`).join('')}</div><div id="wordFeedback"></div></div></div><div class="viewport-actions modal-actions"><button class="primary" id="checkWords">두 낱말 확인</button></div>`;showModal();let selected=[];document.querySelectorAll('[data-word]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-word]').forEach(x=>x.classList.remove('wrong'));document.getElementById('wordFeedback').innerHTML='';const v=+b.dataset.word,idx=selected.indexOf(v);if(idx>=0){selected.splice(idx,1);b.classList.remove('selected')}else if(selected.length<2){selected.push(v);b.classList.add('selected')}else{document.getElementById('wordFeedback').innerHTML='<div class="notice warn">낱말은 두 개만 고를 수 있습니다.</div>'}});document.getElementById('checkWords').onclick=()=>{if(selected.length!==2){document.getElementById('wordFeedback').innerHTML='<div class="notice warn">관련 있다고 생각하는 낱말 두 개를 고르세요.</div>';return}const ok=x.correctWords.every(v=>selected.includes(v));document.querySelectorAll('[data-word]').forEach(b=>{const v=+b.dataset.word;b.classList.toggle(ok&&x.correctWords.includes(v)?'correct':(!ok&&selected.includes(v)?'wrong':false))});if(!ok){document.getElementById('wordFeedback').innerHTML='<div class="notice warn"><b>다시 사진과 설명을 함께 살펴보세요.</b><br>인물·행동·장소·사건과 직접 연결되는 낱말을 고르세요.</div>';return}if(!p.viewed.includes(id))p.viewed.push(id);save();document.getElementById('wordFeedback').innerHTML=`<div class="notice good"><b>관찰 완료!</b><br>${esc(x.title)} · ${esc(x.year)}<br>${esc(x.short)}</div>`;document.getElementById('checkWords').textContent='사진 목록으로 돌아가기';document.getElementById('checkWords').onclick=()=>{closeModal();renderChapter()}}}

function flowHTML(ch,p){return `<section class="panel"><h3 class="panel-title"><span class="step-badge">5</span> 앞의 일과 뒤의 일 연결하기</h3><div class="flow-box"><div class="flow-node">${esc(ch.flow.before)}</div><div class="flow-arrow">↓</div><div class="flow-blank"><p class="question">${esc(ch.flow.q)}</p>${optionSet(ch.flow,p,'flow','flow')}<div id="flowFeedback" class="quiz-feedback"></div></div><div class="flow-arrow">↓</div><div class="flow-node">${esc(ch.flow.after)}</div></div></section>`}
function thoughtOrCompleteHTML(ch,p){if(!ch.thought)return completeHTML(ch);if(p.thoughtDone)return completeHTML(ch);return `<section class="panel"><h3 class="panel-title"><span class="step-badge">6</span> 사진에서 시작한 나의 생각</h3><p class="question">${esc(ch.thought.prompt)}</p><textarea id="thoughtText" maxlength="350" placeholder="사진 속 장면과 그렇게 생각한 까닭을 자신의 말로 적어 보세요.">${esc(p.thought)}</textarea><div class="char-info"><span id="thoughtCount">${p.thought.length}</span>자 · ${ch.thought.min}자 이상</div><div id="thoughtFeedback"></div><div class="viewport-actions"><span class="action-hint">생각과 그 까닭을 적은 뒤 저장하세요.</span><button class="primary" id="saveThought">생각 저장하고 이 장 마치기</button></div></section>`}
function completeHTML(ch){return `<section class="panel chapter-complete"><div class="seal">✓</div><h3>${ch.id}장 이야기를 연결했습니다.</h3><p>사진·교과서 문장·사건의 흐름을 모두 확인했습니다.</p><div class="viewport-actions"><span class="action-hint">이 장의 학습을 마쳤습니다.</span><button class="primary" id="nextChapter">${state.current===chapters.length-1?'사진 연표 만들러 가기':'다음 이야기로'}</button></div></section>`}
function checkAnswer(ch,p,type){const q=ch[type],buttons=[...document.querySelectorAll(`[data-quiz="${type}"]`)],feedback=document.getElementById(type+'Feedback');buttons.forEach(b=>b.onclick=()=>{const v=+b.dataset.value;if(v===q.correct){buttons.forEach(x=>{x.disabled=true;x.classList.remove('wrong');x.classList.toggle('correct',+x.dataset.value===q.correct)});p[type]=true;save();feedback.innerHTML='<div class="notice good"><b>맞았습니다.</b> 사진들과 역사적 사실이 올바르게 연결되었습니다.</div>';setTimeout(()=>renderStages(ch,p),450)}else{b.classList.add('wrong');feedback.innerHTML=`<div class="notice warn"><b>다시 생각해 보세요.</b><br>${esc(q.hint||'사진과 이야기의 앞뒤 관계를 다시 살펴보세요.')}</div>`}})}
function bindStages(ch,p){if(!p.infer){checkAnswer(ch,p,'infer');return}const bs=document.getElementById('bookSentence');if(bs){bs.oninput=e=>{p.bookSentence=e.target.value;document.getElementById('bookCount').textContent=e.target.value.length;save()};document.getElementById('saveBook').onclick=()=>{const t=bs.value.trim(),hasKey=ch.bookKeywords.some(k=>t.includes(k));if(t.length<12||!hasKey){document.getElementById('bookFeedback').innerHTML=`<div class="notice warn">교과서에서 이 장과 관련된 문장을 찾아 12자 이상 적으세요.<br><small>관련 낱말 예: ${ch.bookKeywords.slice(0,4).join(', ')}</small></div>`;return}p.bookSentence=t;p.story=true;save();renderStages(ch,p)}}if(p.story&&!p.fact){checkAnswer(ch,p,'fact');return}if(p.fact&&!p.flow){checkAnswer(ch,p,'flow');return}if(p.flow&&ch.thought&&!p.thoughtDone){const ta=document.getElementById('thoughtText');ta.oninput=e=>{p.thought=e.target.value;document.getElementById('thoughtCount').textContent=e.target.value.length;save()};document.getElementById('saveThought').onclick=()=>{const t=ta.value.trim();if(t.length<ch.thought.min){document.getElementById('thoughtFeedback').innerHTML=`<div class="notice warn">사진 속 장면과 그렇게 생각한 까닭이 드러나도록 ${ch.thought.min}자 이상 적어 보세요.</div>`;return}setThought(ch.id,t);save();renderStages(ch,p)}}const nx=document.getElementById('nextChapter');if(nx)nx.onclick=nextChapter}
function nextChapter(){state.current++;save();render();window.scrollTo(0,0)}

function renderFinal(){updateProgress();main.innerHTML=`<section class="final-intro"><div class="eyebrow">FINAL PROJECT</div><h2>나의 민주화 사진 연표</h2><p>각 시기에서 기억에 남는 사진을 고르고, 정확한 설명과 연결 문장으로 민주화의 흐름을 완성합니다. 앞에서 쓴 네 개의 생각은 알맞은 시기의 사진 아래에 자동으로 들어갑니다.</p></section>${state.final.step===0?selectPhotosHTML():state.final.step===1?editTimelineHTML():state.final.step===2?finalThoughtHTML():finalCheckHTML()}`;bindFinal()}
function selectPhotosHTML(){return `<section class="panel"><h3 class="panel-title"><span class="step-badge">1</span> 시기별로 기억에 남는 사진 고르기</h3><p class="lead">다섯 시기에서 한 장씩 고르세요. 사진을 누르면 선택이 바뀝니다.</p>${phases.map(ph=>`<div class="phase"><h3>${ph.title}</h3><div class="select-photo-grid">${ph.photos.map(id=>`<button class="select-photo ${state.final.selections[ph.id]===id?'chosen':''}" data-phase="${ph.id}" data-photo="${id}"><img src="${IMG+photos[id].src}" alt="${esc(photos[id].title)}"><span>${esc(photos[id].short)}</span></button>`).join('')}</div></div>`).join('')}<div class="viewport-actions"><span class="action-hint">다섯 시기에서 사진을 한 장씩 고르세요.</span><button class="primary" id="toEdit">사진 선택 완료</button></div></section>`}
function finalOptions(correct,wrong,selected,key){const choices=[correct,...wrong],order=orderFor(state.final,key,choices.length);return `<div class="options">${order.map((orig,i)=>`<button class="option ${selected===orig?'selected':''}" data-finalkey="${key}" data-value="${orig}"><span class="opt-num">${i+1}</span><span>${esc(choices[orig])}</span></button>`).join('')}</div>`}
function phaseThoughtHTML(ph){return thoughtsForPhase(ph).map(t=>`<div class="timeline-thought"><b>이 시기에 내가 쓴 생각</b><div class="thought-source">${esc(t.title)}</div>${esc(t.text)}</div>`).join('')}
function editTimelineHTML(){const rows=phases.map((ph,i)=>{const id=state.final.selections[ph.id],item=`<div class="timeline-item"><img src="${IMG+photos[id].src}" alt=""><div><h4>${i+1}. ${ph.title}</h4><p class="lead">사진에 맞는 사실 설명을 고르세요.</p>${finalOptions(ph.caption,ph.wrong,state.final.captions[ph.id],`cap:${ph.id}`)}${phaseThoughtHTML(ph)}</div></div>`;const con=i<connectors.length?`<div class="connector-edit"><div></div><div><p>사진 사이에 들어갈 연결 문장</p>${finalOptions(connectors[i].text,connectors[i].wrong,state.final.connectors[i],`con:${i}`)}</div></div>`:'';return item+con}).join('');return `<section class="panel"><h3 class="panel-title"><span class="step-badge">2</span> 사진 아래 사실과 사이의 연결 문장 완성하기</h3><p class="lead">앞에서 쓴 생각은 알맞은 시기의 사진 아래에 자동으로 배치되어 있습니다.</p><div class="timeline-edit">${rows}</div><div id="finalEditFeedback"></div><div class="viewport-actions"><span class="action-hint">설명과 연결 문장을 모두 고른 뒤 확인하세요.</span><button class="ghost" id="backSelect">사진 다시 고르기</button><button class="primary" id="checkTimeline">연표 내용 확인</button></div></section>`}
function finalThoughtHTML(){const list=thoughtChapters();return `<section class="panel"><h3 class="panel-title"><span class="step-badge">3</span> 지금까지 쓴 생각 모두 확인하기</h3><p class="lead">앞의 장에서 쓴 생각이 모두 모였습니다. 빠진 문장이 있으면 여기서 보충하고, 고치고 싶은 문장은 수정하세요. 저장 이미지에서는 각 생각이 해당 시기의 사진 아래에 자동으로 들어갑니다.</p><div class="all-thoughts">${list.map((ch,i)=>`<div class="all-thought"><b>${i+1}. ${esc(ch.title)}</b><div class="thought-source">${esc(ch.thought.prompt)}</div><textarea data-final-thought="${ch.id}" maxlength="350" placeholder="이 장에서 쓴 생각을 적어 주세요.">${esc(getThought(ch.id))}</textarea><div class="char-info"><span data-thought-count="${ch.id}">${getThought(ch.id).length}</span>자 · ${ch.thought.min}자 이상</div></div>`).join('')}</div><h3 style="margin-top:24px">내가 생각하는 민주주의</h3><p class="lead">사진 이야기를 모두 살펴본 뒤의 생각을 한 문장으로 적으세요. 이 문장도 연표의 마지막에 함께 저장됩니다.</p><textarea id="democracyText" maxlength="250" placeholder="예: 민주주의는 시민이 자신의 권리와 다른 사람의 권리를 함께 지켜 갈 때 발전한다고 생각한다.">${esc(state.final.democracy)}</textarea><div class="char-info"><span id="demoCount">${state.final.democracy.length}</span>자 · 15자 이상</div><div id="finalThoughtFeedback"></div><div class="viewport-actions"><span class="action-hint">모든 생각 문장을 확인한 뒤 미리 보세요.</span><button class="ghost" id="backEdit">연표 내용 다시 보기</button><button class="primary" id="toCheck">생각까지 담긴 작품 미리 보기</button></div></section>`}
function finalCheckHTML(){return `<section class="panel"><h3 class="panel-title"><span class="step-badge">4</span> 나의 사진 연표 완성하기</h3><p class="lead">사진, 역사적 사실, 연결 문장, 4·19 혁명, 군사 정변·유신 체제, 5·18 민주화 운동, 6월 민주 항쟁에서 쓴 네 개의 생각과 마지막 민주주의 문장이 한 장의 연표에 담깁니다.</p><div class="notice">완성 버튼을 누르면 PNG 이미지가 만들어집니다. 태블릿에서는 이미지 저장 또는 화면 캡처로 결과물을 남길 수 있습니다.</div><div class="viewport-actions"><span class="action-hint">완성하면 사진 연표 이미지가 만들어집니다.</span><button class="ghost" id="backThought">마지막 생각 수정하기</button><button class="primary" id="finishBtn">나의 민주화 사진 연표 완성</button></div></section>`}
function bindFinal(){document.querySelectorAll('[data-phase]').forEach(b=>b.onclick=()=>{state.final.selections[b.dataset.phase]=b.dataset.photo;b.closest('.select-photo-grid').querySelectorAll('.select-photo').forEach(x=>x.classList.toggle('chosen',x===b));save()});const te=document.getElementById('toEdit');if(te)te.onclick=()=>{if(phases.some(p=>!state.final.selections[p.id])){alert('각 시기에서 사진을 한 장씩 선택하세요.');return}state.final.step=1;save();renderFinal();window.scrollTo(0,0)};document.querySelectorAll('[data-finalkey]').forEach(b=>b.onclick=()=>{const [type,id]=b.dataset.finalkey.split(':');if(type==='cap')state.final.captions[id]=+b.dataset.value;else state.final.connectors[id]=+b.dataset.value;b.closest('.options').querySelectorAll('.option').forEach(x=>x.classList.toggle('selected',x===b));save()});const bs=document.getElementById('backSelect');if(bs)bs.onclick=()=>{state.final.step=0;save();renderFinal()};const ct=document.getElementById('checkTimeline');if(ct)ct.onclick=()=>{const caps=phases.every(p=>state.final.captions[p.id]===0),cons=connectors.every((c,i)=>state.final.connectors[i]===0);if(!caps||!cons){document.getElementById('finalEditFeedback').innerHTML='<div class="notice warn"><b>아직 맞지 않는 설명이나 연결 문장이 있습니다.</b><br>사진의 시기와 앞뒤 사건의 관계를 다시 확인하세요.</div>';return}state.final.step=2;save();renderFinal();window.scrollTo(0,0)};document.querySelectorAll('[data-final-thought]').forEach(ta=>ta.oninput=e=>{const id=+e.target.dataset.finalThought;setThought(id,e.target.value);const count=document.querySelector(`[data-thought-count="${id}"]`);if(count)count.textContent=e.target.value.length;save()});const dt=document.getElementById('democracyText');if(dt)dt.oninput=e=>{state.final.democracy=e.target.value;document.getElementById('demoCount').textContent=e.target.value.length;save()};const be=document.getElementById('backEdit');if(be)be.onclick=()=>{state.final.step=1;save();renderFinal()};const tc=document.getElementById('toCheck');if(tc)tc.onclick=()=>{const missing=thoughtChapters().filter(ch=>getThought(ch.id).length<ch.thought.min);if(missing.length){document.getElementById('finalThoughtFeedback').innerHTML=`<div class="notice warn"><b>아직 생각 문장이 빠졌거나 너무 짧은 장이 있습니다.</b><br>${missing.map(ch=>esc(ch.title)).join(', ')}<br>각 생각을 제시된 글자 수 이상으로 완성하세요.</div>`;document.querySelector(`[data-final-thought="${missing[0].id}"]`)?.focus();return}const t=dt.value.trim();if(t.length<15){document.getElementById('finalThoughtFeedback').innerHTML='<div class="notice warn">민주주의에 대한 자신의 생각을 15자 이상 적으세요.</div>';return}state.final.democracy=t;state.final.step=3;save();renderFinal()};const bt=document.getElementById('backThought');if(bt)bt.onclick=()=>{state.final.step=2;save();renderFinal()};const fin=document.getElementById('finishBtn');if(fin)fin.onclick=()=>{const missing=thoughtChapters().filter(ch=>getThought(ch.id).length<ch.thought.min);if(missing.length){state.final.step=2;save();renderFinal();return}state.completed=true;save();render()}}
async function renderComplete(){updateProgress();main.innerHTML=`<section class="final-intro"><div class="eyebrow">COMPLETED</div><h2>${esc(state.name)}의 민주화 사진 연표</h2><p>여러 사진의 맥락을 연결하고, 역사적 사실과 각 시기에 작성한 생각을 담아 연표를 완성했습니다.</p></section><div class="completion-actions viewport-actions"><button class="primary" id="downloadPoster">PNG 이미지로 저장</button><button class="ghost" id="printPoster">인쇄하기</button><button class="ghost" id="editPoster">연표 수정하기</button></div><div class="poster-wrap"><img id="posterPreview" alt="완성된 민주화 사진 연표"></div><div class="notice good" style="max-width:720px;margin:16px auto"><b>태블릿에서 저장이 되지 않을 때</b><br>완성 작품이 모두 보이도록 스크롤 캡처를 하거나, 인쇄하기에서 PDF로 저장하세요.</div>`;const url=await buildPoster();document.getElementById('posterPreview').src=url;document.getElementById('downloadPoster').onclick=()=>{const a=document.createElement('a');a.download=`${state.name}_민주화_사진연표.png`;a.href=url;a.click()};document.getElementById('printPoster').onclick=()=>window.print();document.getElementById('editPoster').onclick=()=>{state.completed=false;state.final.step=2;save();render();window.scrollTo(0,0)}}
function loadImage(src){return new Promise((res,rej)=>{const im=new Image();im.onload=()=>res(im);im.onerror=rej;im.src=src})}
function wrapText(ctx,text,x,y,maxWidth,lineHeight,maxLines=99){const chars=[...text];let line='',lines=[];for(const c of chars){const test=line+c;if(ctx.measureText(test).width>maxWidth&&line){lines.push(line);line=c}else line=test}if(line)lines.push(line);lines=lines.slice(0,maxLines);lines.forEach((l,i)=>ctx.fillText(l,x,y+i*lineHeight));return y+lines.length*lineHeight}
function coverDraw(ctx,img,x,y,w,h){const r=Math.max(w/img.width,h/img.height),sw=w/r,sh=h/r,sx=(img.width-sw)/2,sy=(img.height-sh)/2;ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h)}
function thoughtsForPhase(ph){return (ph.thoughtChapters||[]).map(id=>{const ch=chapters.find(c=>c.id===id);return {title:ch?ch.title:'나의 생각',text:getThought(id)}}).filter(x=>x.text)}
async function buildPoster(){const W=1200,phaseHeights=phases.map(ph=>390+thoughtsForPhase(ph).length*280),H=250+phaseHeights.reduce((a,b)=>a+b,0)+(connectors.length*62)+300+80,canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;const c=canvas.getContext('2d');c.fillStyle='#f6f0e3';c.fillRect(0,0,W,H);c.fillStyle='#163453';c.fillRect(0,0,W,205);c.fillStyle='#fff';c.textAlign='center';c.font='800 58px "Noto Sans KR",sans-serif';c.fillText('나의 민주화 사진 연표',W/2,82);c.font='500 27px sans-serif';c.fillText(`${state.name} · 사진으로 연결한 대한민국 민주화 이야기`,W/2,135);c.fillStyle='#e6c87e';c.fillRect(140,163,W-280,5);let y=250;const imgs={};for(const ph of phases){const id=state.final.selections[ph.id];imgs[id]=await loadImage(IMG+photos[id].src)}c.textAlign='left';for(let i=0;i<phases.length;i++){const ph=phases[i],id=state.final.selections[ph.id],im=imgs[id],thoughts=thoughtsForPhase(ph),h=phaseHeights[i];c.fillStyle='#fff';roundRect(c,70,y,W-140,h,24,true);coverDraw(c,im,95,y+25,390,270);c.fillStyle='#173b5d';c.font='800 30px sans-serif';c.fillText(`${i+1}. ${ph.title}`,520,y+55);c.fillStyle='#26364b';c.font='500 24px sans-serif';wrapText(c,ph.caption,520,y+105,575,38,6);c.fillStyle='#667184';c.font='500 18px sans-serif';c.fillText(`${photos[id].year} · ${photos[id].short}`,95,y+330);let ty=y+365;for(const t of thoughts){c.fillStyle='#fff3d8';roundRect(c,95,ty,W-190,245,14,true);c.fillStyle='#9a650e';c.font='800 18px sans-serif';c.fillText('이 시기를 보며 내가 쓴 생각',115,ty+31);c.fillStyle='#7a6846';c.font='600 16px sans-serif';c.fillText(t.title,115,ty+58);c.fillStyle='#3c3426';c.font='500 20px sans-serif';wrapText(c,t.text,115,ty+94,W-230,30,5);ty+=265}y+=h+20;if(i<connectors.length){c.textAlign='center';c.fillStyle='#a86d0f';c.font='800 23px sans-serif';c.fillText('↓  '+connectors[i].text,W/2,y+24);c.textAlign='left';y+=62}}
 c.fillStyle='#e6eef4';roundRect(c,70,y,W-140,230,22,true);c.fillStyle='#173b5d';c.font='800 31px sans-serif';c.fillText('내가 생각하는 민주주의',95,y+52);c.fillStyle='#1e2d40';c.font='600 25px sans-serif';wrapText(c,state.final.democracy,95,y+103,W-190,38,4);c.fillStyle='#6c7480';c.font='500 16px sans-serif';c.fillText('사진 자료의 출처와 이용 조건은 웹앱의 ⓘ에서 확인할 수 있습니다.',70,H-35);return canvas.toDataURL('image/png')}
function roundRect(ctx,x,y,w,h,r,fill){ctx.beginPath();if(ctx.roundRect){ctx.roundRect(x,y,w,h,r)}else{ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y)}if(fill)ctx.fill()}
function showInfo(){const list=Object.values(photos).map((p,i)=>`<div class="credit"><b>${i+1}. ${esc(p.title)}</b><br>${esc(p.source)}<br><a href="${p.page}" target="_blank" rel="noopener">원본 파일 설명과 이용 조건 확인</a></div>`).join('');document.getElementById('modalBox').innerHTML=`<div class="modal-head"><h3>사용 방법 · 사진 출처</h3><button class="icon-btn" id="closeModal">닫기</button></div><div class="notice"><b>사진은 저장소의 images 폴더에 압축 WebP로 포함됩니다.</b><br>가로형 태블릿에서는 확인·저장·다음 버튼이 화면 아래에 항상 표시됩니다.<br>모든 선택형 문제의 보기 순서는 학생이 시작할 때 무작위로 섞이며, 같은 화면 안에서는 순서가 유지됩니다.</div><p>사진 설명을 읽고 관련 낱말 두 개를 찾아야 관찰 완료로 인정됩니다. 이야기 뒤에는 교과서에서 관련 문장 한 문장을 직접 찾아 적습니다.</p><h3>사진 및 기록 자료 ${Object.keys(photos).length}개</h3><div class="credits">${list}</div>`;showModal()}
document.getElementById('infoBtn').onclick=showInfo;document.getElementById('homeBtn').onclick=()=>{state.started=false;save();render();window.scrollTo(0,0)};document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')closeModal()};render();
</script>
